<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Signing in...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #0f172a;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .card {
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 20px 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        max-width: 360px;
        width: 100%;
        text-align: center;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px 0;
      }

      .text {
        margin: 0;
        color: #475569;
        font-size: 14px;
      }

      .error {
        margin-top: 12px;
        color: #b91c1c;
        font-size: 13px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <p class="title">Signing in...</p>
        <p class="text">You can close this window if it does not close automatically.</p>
        <p id="auth-error" class="error"></p>
      </div>
    </div>
  </body>
</html>
